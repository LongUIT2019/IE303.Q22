<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Người Dùng | Admin Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            background: #0f172a;
            color: white;
        }

        #sidebar {
            width: 300px;
            background: rgba(30, 41, 59, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        #content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header-title {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .menu-item {
            padding: 12px 15px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.2s;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-item:hover,
        .menu-item.active {
            background: #334155;
            color: white;
        }

        .user-panel {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            font-size: 13px;
        }

        .logout-btn {
            background: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #ef4444;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        th,
        td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            background: rgba(0, 0, 0, 0.3);
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .btn-action {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-action.activate {
            background: #10b981;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h2 class="header-title"><i class="fa-solid fa-server"></i> ADMIN PANEL</h2>

        <a href="/admin" class="menu-item"><i class="fa-solid fa-map-location-dot"></i> Bản Đồ Trực Tiếp</a>
        <a href="/admin/users" class="menu-item active"><i class="fa-solid fa-users"></i> Khách Hàng</a>
        <a href="/admin/drivers" class="menu-item"><i class="fa-solid fa-car"></i> Tài Xế</a>

        <div class="user-panel">
            <div>
                <i class="fa-regular fa-circle-user" style="color: #3b82f6;"></i>
                <strong sec:authentication="name">Admin</strong>
            </div>
            <form th:action="@{/logout}" method="post" style="margin: 0;">
                <button type="submit" class="logout-btn"><i class="fa-solid fa-power-off"></i> Thoát</button>
            </form>
        </div>
    </div>

    <div id="content">
        <h2>Quản Lý Khách Hàng</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên Liên Hệ</th>
                    <th>Email</th>
                    <th>Trạng Thái</th>
                    <th>Hành Động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}">1</td>
                    <td th:text="${u.username}">Alice</td>
                    <td th:text="${u.email}">alice@gmail.com</td>
                    <td><span style="color:#10b981; font-weight:bold;">Đang Hoạt Động</span></td>
                    <td>
                        <button class="btn-action">Khóa Tài Khoản</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>

</html>
